name: Security

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "29 3 * * *"

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Local secret guard scan
        run: python3 scripts/scan_secrets.py

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
